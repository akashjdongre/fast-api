version: "3.8"
services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi
    ports:
      - "8062:8000"
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --reload
  
  redis:
    image: redis:7-alpine
    container_name: fa_redis_container
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  redis_data:
